name: Build TCM Storage iOS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"
      - name: Install iOS 18.5 simulator runtime
        run: |
          xcrun simctl list runtimes
          xcodebuild -downloadPlatform iOS -buildVersion 18.5 || true
      - name: Resolve Swift Package dependencies
        run: xcodebuild -resolvePackageDependencies -project Nextcloud.xcodeproj
      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project Nextcloud.xcodeproj \
            -scheme Nextcloud \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.5" \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build | tee xcodebuild.log | xcpretty || (tail -400 xcodebuild.log && exit 1)
      - name: Package .app for Appetize
        run: |
          mkdir -p out
          APP_PATH=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name "*.app" -type d | head -1)
          echo "App path: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r /Users/runner/work/_temp/tcm-storage-ios.zip "$(basename "$APP_PATH")"
          cp /Users/runner/work/_temp/tcm-storage-ios.zip ../../../../../out/tcm-storage-ios.zip
          ls -la ../../../../../out/
      - uses: actions/upload-artifact@v4
        with:
          name: tcm-storage-ios-app
          path: out/tcm-storage-ios.zip
          retention-days: 30
      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: ios-debug-${{ github.run_number }}
          name: TCM Storage iOS debug build ${{ github.run_number }}
          files: out/tcm-storage-ios.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
